        const winterZhi = ["亥", "子", "丑"]; 
        const summerZhi = ["巳", "午", "未"]; 

        function calculateBazi() {
            let birthdayInput = document.getElementById('userBirthday').value;
            if (!birthdayInput) { alert("请先选择你的生日哦！"); return; }

            let parts = birthdayInput.split('-');
            let year = parseInt(parts[0]);
            let month = parseInt(parts[1]);
            let day = parseInt(parts[2]);

            try {
                let solar = Solar.fromYmd(year, month, day);
                let lunar = solar.getLunar(); 
                
                let userZodiac = solar.getXingZuo() + "座"; 
                
                let userYearGanZhi = lunar.getYearInGanZhi();
                let userMonthGanZhi = lunar.getMonthInGanZhi();
                let userDayGanZhi = lunar.getDayInGanZhi(); 
                
                let userYearGan = userYearGanZhi.charAt(0);
                let userYearZhi = userYearGanZhi.charAt(1);
                let userMonthGan = userMonthGanZhi.charAt(0);
                let userMonthZhi = userMonthGanZhi.charAt(1);
                let userDayGan = userDayGanZhi.charAt(0);         
                let userDayZhi = userDayGanZhi.charAt(1);
                
                let userWuxing = tianganWuxing[userDayGan]; 

                // 🚨 核心改动：用一个数组保存所有偶像的得分结果
                let allResults = [];

                for (let i = 0; i < idols.length; i++) {
                    let currentIdol = idols[i];
                    let score = 0;
                    let currentReasons = [];

                    let nianyueArr = currentIdol.bazi_nianyue.replace(/年|月/g, '').split(' ');
                    let idolYearGanZhi = nianyueArr[0]; 
                    let idolMonthGanZhi = nianyueArr[1];

                    let idolYearGan = idolYearGanZhi.charAt(0);
                    let idolYearZhi = idolYearGanZhi.charAt(1);
                    let idolMonthGan = idolMonthGanZhi.charAt(0);
                    let idolMonthZhi = idolMonthGanZhi.charAt(1);
                    let idolDayGan = currentIdol.bazi_rizhu.charAt(0); 
                    let idolDayZhi = currentIdol.bazi_rizhu.charAt(1); 

                    let dayGanPair1 = userDayGan + idolDayGan;
                    let dayGanPair2 = idolDayGan + userDayGan;
                    let dayZhiPair1 = userDayZhi + idolDayZhi;
                    let dayZhiPair2 = idolDayZhi + userDayZhi;
                    
                    let yearGanPair1 = userYearGan + idolYearGan;
                    let yearGanPair2 = idolYearGan + userYearGan;
                    let monthGanPair1 = userMonthGan + idolMonthGan;
                    let monthGanPair2 = idolMonthGan + userMonthGan;

                    if (ganWuHe.includes(dayGanPair1) || ganWuHe.includes(dayGanPair2)) {
                        score += 40; currentReasons.push("✨ <b>日干相合 (+40分)</b>：思想高度共鸣，天生具有强烈的灵魂吸引力。");
                    }
                    if (zhiLiuHe.includes(dayZhiPair1) || zhiLiuHe.includes(dayZhiPair2)) {
                        score += 50; currentReasons.push("💖 <b>日支暗合 (+50分)</b>：配偶宫相合，三观一致，相处极度舒适。");
                    }
                    if (ganXiangKe.includes(dayGanPair1) || ganXiangKe.includes(dayGanPair2)) {
                        score -= 20; currentReasons.push("🌩️ <b>日干相克 (-20分)</b>：气场碰撞强烈，容易产生想要改变对方的冲动，相处中伴随摩擦与内耗。");
                    }
                    if (ganWuHe.includes(yearGanPair1) || ganWuHe.includes(yearGanPair2)) {
                        score += 15; currentReasons.push("🕰️ <b>年柱相合 (+15分)</b>：宿命般的羁绊，初见时便会有一见如故的强烈熟悉感。");
                    }
                    if (ganWuHe.includes(monthGanPair1) || ganWuHe.includes(monthGanPair2)) {
                        score += 25; currentReasons.push("🤝 <b>月柱相合 (+25分)</b>：事业与价值观的完美共振，是能互相成就的神仙拍档。");
                    }

                    let userIsWinter = winterZhi.includes(userMonthZhi);
                    let userIsSummer = summerZhi.includes(userMonthZhi);
                    let idolIsWinter = winterZhi.includes(idolMonthZhi);
                    let idolIsSummer = summerZhi.includes(idolMonthZhi);
                    
                    if ((userIsWinter && idolIsSummer) || (userIsSummer && idolIsWinter)) {
                        score += 35; currentReasons.push("❄️🔥 <b>温度调候 (+35分)</b>：你们能抚平彼此性格中的焦躁与孤独，提供情绪价值。");

 if (userDayGan === idolDayGan) {

                let resultHtml = `
                    <hr style="border: 0; border-top: 2px dashed #af2a2d; margin: 25px 0;">
                    <p style="color:#666; font-size:14px;">你的八字：<strong>${userYearGanZhi}年 ${userMonthGanZhi}月 ${userDayGanZhi}日</strong><br>日主属：<strong>${userWuxing}</strong> | 星座：<strong>${userZodiac}</strong></p>
                    <h3 style="color:#2f3542; margin-top:25px; margin-bottom: 20px;">🏆 你的楼孩契合度排行 🏆</h3>
                `;

                const medalNames = ["🥇 第一名", "🥈 第二名", "🥉 第三名"];
                const borderColors = ["#af2a2d", "#a4b0be", "#ced6e0"];
                const badgeColors = ["#af2a2d", "#747d8c", "#a4b0be"];

                // 循环生成前三名的卡片
                for (let k = 0; k < top3.length; k++) {
                    let match = top3[k];
                    
                    // 把原因列表变成HTML
                    let reasonsHtml = match.reasons.map(r => `<p style="text-align:left; font-size:13px; color:#555; background:#fff0f5; padding:8px; border-radius:5px; margin:5px 0; line-height: 1.5;">${r}</p>`).join('');

                    // 拼接每个人的专属卡片
                    resultHtml += `
                        <div style="background:#fdfbfb; border: 2px solid ${borderColors[k]}; padding: 15px; border-radius: 10px; margin-bottom: 25px; position: relative;">
                            <div style="position: absolute; top: -14px; left: 15px; background: ${badgeColors[k]}; color: white; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                                ${medalNames[k]}
                            </div>
                            <p style="font-size: 26px; color: ${k === 0 ? '#af2a2d' : '#2f3542'}; font-weight: bold; margin: 15px 0 5px 0; letter-spacing: 2px;">
                                ${match.idol.name}
                            </p>
                            <p style="font-size: 14px; color: #ff4757; font-weight: bold; margin-bottom: 15px;">
                                契合指数：${match.finalScore} 分
                            </p>
                            <div style="text-align: left;">
                                <p style="font-size:12px; color:#999; margin-bottom:8px; font-weight:bold;">📜 详细解读</p>
                                ${reasonsHtml}
                            </div>
                        </div>
                    `;
                }

                // 把最终的HTML放进页面里
                let resultDiv = document.getElementById('result');
                resultDiv.innerHTML = resultHtml;

            } catch (error) {
                console.error("报错细节：", error); 
                alert("系统出错啦，请检查输入的日期是否正确！");
            }
        }
    </script>
